{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow">
      <div class="card-header bg-success text-white text-center py-3">
        <h4>Ro'yxatdan o'tish</h4>
      </div>
      <div class="card-body p-4">

        {% if error %}
          <div class="alert alert-danger" role="alert">
            {{ error }}
          </div>
        {% endif %}

        <form method="post" action="/auth/register">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username" required>
          </div>
          <div class="mb-3">
            <label for="full_name" class="form-label">To'liq ism</label>
            <input type="text" class="form-control" id="full_name" name="full_name" required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Parol</label>
            <input type="password" class="form-control" id="password" name="password" required>
          </div>
          <div class="mb-4">
            <label for="role" class="form-label">Rol</label>
            <select class="form-select" id="role" name="role" required>
              <option value="" disabled selected>Tanlang</option>
              <option value="investor">Investor</option>
              <option value="gen_podryadchik">Gen. podryadchik</option>
              <option value="sub_podryadchik">Sub-podryadchik</option>
              <option value="prorab">Prorab</option>
              <option value="ishchi">Ishchi</option>
              <option value="qabul_komissiyasi">Qabul komissiyasi</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <button type="submit" class="btn btn-success w-100 py-2">Ro'yxatdan o'tish</button>
        </form>

        <div class="text-center mt-3">
          <small>Allaqachon hisobingiz bormi? <a href="/auth/login">Kirish</a></small>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
