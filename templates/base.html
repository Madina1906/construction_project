<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title|default("Qurilish Monitoring") }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    main { min-height: 70vh; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Qurilish Monitoring</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Loyihalar</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Vazifalar</a></li>
      </ul>

      <ul class="navbar-nav ms-auto">
        {% if user %}
          <li class="nav-item">
            <span class="nav-link text-light">{{ user.full_name }} ({{ user.role }})</span>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/auth/logout">Chiqish</a>
          </li>
        {% else %}
          <li class="nav-item">
            <a class="nav-link" href="/auth/login">Kirish</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/auth/register">Ro'yxatdan o'tish</a>
          </li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>

<main class="container mt-4 mb-5">
  {% block content %}{% endblock %}
</main>

<footer class="bg-dark text-light text-center py-3 mt-auto">
  <p>© 2025–2026 Qurilish loyihasi boshqaruvi</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
